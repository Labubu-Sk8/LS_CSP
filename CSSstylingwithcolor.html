<!--CSS styling with color assignment-->

<!DOCTYPE html>
<hmtl lang="en">
    <head>
        <titile>CSS Styling With Color</titile>
        <meta charset="UTF-8">

        <style>
            body{
                background-color:lightgray;
            }
                
            
            #Complementary{
                background-color: purple;
                border: 7px solid yellow;
                height:200px;
                width:200px;
                color:white;
                font-size:2em;
            }
            #Analogous{
                background-color: rgb(0, 49, 155);
                border:7px solid rgb(87, 0, 128);
                height:200px;
                width:200px;
                color:rgb(117, 160, 252);
                font-size:2em;
            }
            #Triadic{
                background-color:rgb(147, 216, 145);
                border:7px solid rgb(255, 200, 99);
                height:200px;
                width:200px;
                color:rgb(212, 137, 255);
                font-size:2em;
            }
           
        </style>

        <body>
            <div id="Complementary">
                <p>These are Complementary colors</p>
            </div>

         
            <div id="Analogous">
                <p>These are Analogous colors</p>
            </div>

        
            <div id="Triadic">
                <p>These are Triadic Colors</p>

            </div>


        </body>
    </head>
</hmtl>
