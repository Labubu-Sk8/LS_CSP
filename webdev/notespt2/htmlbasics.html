<!--Hypertext Markup Language-->
<!DOCTYPE html> <!--tell the computer this is all HTML-->
<html lang="en">
    <head><!--holds information for web browser, not seen on the page-->
        <titile>HTML Basics Notes <titile> <!--shows the title of the website-->
        <meta charset="UTF-8"> <!--Self closing ta, it doent have a 2nd tag-->
    </head>
    <body><!--Hold everything that the user sees on my webpage-->
        <h1>This is a level 1 header<h1>
        <h2>This is a level 2 header<h2>
        <h5>This is a level 5 header<h5>
        <h6>This is a level 6 header<h6>
        <p><b>this is a basic paragraph<p></p>
        
    
    </body>
</html>
